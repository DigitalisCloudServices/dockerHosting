---
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck --severity=warning \
            setup.sh \
            deploy-site.sh \
            scripts/*.sh

  test-syntax:
    name: Syntax checks (bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run syntax tests
        run: bats tests/test_syntax.bats

  test-arg-validation:
    name: Argument validation tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run argument validation tests
        run: bats tests/test_arg_validation.bats

  test-traefik:
    name: Traefik script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update
          # Use the upstream bats-core package for v1.x features (tap output, --recursive)
          sudo apt-get install -y bats || true
          # Fallback: install from GitHub release if system package is too old
          if ! bats --version | grep -qP 'Bats [1-9]'; then
            curl -fsSL https://github.com/bats-core/bats-core/archive/refs/tags/v1.11.0.tar.gz \
              | tar -xz -C /tmp
            sudo bash /tmp/bats-core-1.11.0/install.sh /usr/local
          fi

      - name: Run Traefik tests
        run: bats --recursive tests/traefik/

  test-yaml:
    name: YAML validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: sudo apt-get update && sudo apt-get install -y yamllint

      - name: Run YAML validation
        run: |
          yamllint -c .yamllint.yml \
            templates/traefik/traefik.yml \
            templates/traefik/middleware.yml \
            .github/workflows/ci.yml

      - name: Validate site.yml.template after substitution
        run: >
          sed 's/{{[A-Z_]*}}/placeholder/g' templates/traefik/site.yml.template
          | yamllint -c .yamllint.yml -
